services:
  - type: web
    name: sponsorflow-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
